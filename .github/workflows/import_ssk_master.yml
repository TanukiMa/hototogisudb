name: Import SSK Master

on:
  workflow_dispatch:
    inputs:
      master_type:
        description: 'Master type to import'
        required: true
        type: choice
        options:
          - shinryo_koi
          - iyakuhin
          - shobyomei
      file_url:
        description: 'Direct URL to the full CSV file (from SSK ZIP)'
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Download master CSV
        env:
          FILE_URL: ${{ inputs.file_url }}
        run: curl -fsSL "${FILE_URL}" -o master.csv

      - name: Import master
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FILE_URL: ${{ inputs.file_url }}
          MASTER_TYPE: ${{ inputs.master_type }}
        run: |
          python scripts/import_${MASTER_TYPE}.py \
            --file master.csv \
            --url "${FILE_URL}" \
            --imported-by "github-actions"
